name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }} / ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: 'laravel-11'
            laravel_constraint: '^11.0'
            testbench_constraint: '^9.0'
          - php: '8.3'
            laravel: 'laravel-12'
            laravel_constraint: '^12.0'
            testbench_constraint: '^10.0'
          - php: '8.4'
            laravel: 'laravel-12'
            laravel_constraint: '^12.0'
            testbench_constraint: '^10.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate Composer
        run: composer validate --strict

      - name: Pin Laravel Matrix
        run: composer require "illuminate/bus:${{ matrix.laravel_constraint }}" "illuminate/contracts:${{ matrix.laravel_constraint }}" "illuminate/database:${{ matrix.laravel_constraint }}" "illuminate/filesystem:${{ matrix.laravel_constraint }}" "illuminate/http:${{ matrix.laravel_constraint }}" "illuminate/support:${{ matrix.laravel_constraint }}" "illuminate/validation:${{ matrix.laravel_constraint }}" "orchestra/testbench:${{ matrix.testbench_constraint }}" --no-interaction --no-update

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pint
        run: composer format:test

      - name: Run PHPStan
        run: composer analyse

      - name: Run Pest
        run: composer test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install NPM Dependencies
        run: npm ci

      - name: Run JavaScript Tests
        run: npm test

      - name: Build Assets
        run: npm run build

      - name: Verify Built Assets Are Current
        run: git diff --exit-code dist package-lock.json
